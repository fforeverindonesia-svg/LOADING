<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WESTLIFE ANNIVERSARY WORLD TOUR</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#000;
color:#fff;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow:hidden;
}

.bg{
position:fixed;
width:100%;
height:100%;
background:url('https://fforeverindonesia-svg.github.io/background.png/') center/cover;
filter:blur(10px);
transform:scale(1.1);
z-index:-2;
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
z-index:-1;
}

.container{
width:100%;
max-width:420px;
background:rgba(15,15,15,0.95);
border:1px solid rgba(255,0,0,0.4);
border-radius:25px;
padding:25px;
box-shadow:0 0 30px rgba(255,0,0,0.3);
animation:fadeIn 1s ease;
}

.poster{
width:100%;
border-radius:20px;
margin-bottom:20px;
}

h1{
text-align:center;
font-size:28px;
color:#ff0000;
margin-bottom:10px;
}

.sub{
text-align:center;
font-size:14px;
margin-bottom:25px;
color:#ddd;
}

.input{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:12px;
background:#1a1a1a;
color:#fff;
font-size:15px;
outline:none;
}

select.input{
appearance:none;
}

.qris{
width:100%;
border-radius:20px;
margin-top:15px;
margin-bottom:20px;
border:2px solid red;
}

.total{
text-align:center;
font-size:20px;
margin-bottom:20px;
color:#FFD700;
font-weight:bold;
}

.btn{
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:red;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:scale(1.03);
background:#ff2222;
}

.loading{
display:none;
text-align:center;
margin-top:15px;
font-size:14px;
color:#ccc;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container">

<img src="https://fforeverindonesia-svg.github.io/posterevent.jpg/" class="poster">

<h1>WESTLIFE TOUR</h1>

<p class="sub">
🎫 Official E-Ticket Booking
</p>

<input type="text" id="nama" class="input" placeholder="Nama Lengkap">

<input type="email" id="email" class="input" placeholder="Email Aktif">

<select id="ticket" class="input">
<option value="Festival">Festival</option>
<option value="VIP">VIP</option>
<option value="VVIP">VVIP</option>
</select>

<select id="qty" class="input" onchange="hitungTotal()">
<option value="1">1 Ticket</option>
<option value="2">2 Ticket</option>
<option value="3">3 Ticket</option>
<option value="4">4 Ticket</option>
</select>

<img src="https://fforeverindonesia-svg.github.io/qris.png/" class="qris">

<div class="total" id="totalText">
TOTAL : Rp 500.000
</div>

<button class="btn" onclick="kirimTicket()">
BAYAR SEKARANG
</button>

<div class="loading" id="loading">
Memproses pembayaran...
</div>

</div>

<script>

emailjs.init("xetUr3ZyFtJ2V9-xE");

function hitungTotal(){

const ticket = document.getElementById("ticket").value;
const qty = parseInt(document.getElementById("qty").value);

let harga = 500000;

if(ticket=="VIP"){
harga=1000000;
}

if(ticket=="VVIP"){
harga=2000000;
}

let total = harga * qty;

document.getElementById("totalText").innerHTML =
"TOTAL : Rp " + total.toLocaleString("id-ID");

}

function kirimTicket(){

const nama = document.getElementById("nama").value;
const email = document.getElementById("email").value;
const ticket = document.getElementById("ticket").value;
const qty = document.getElementById("qty").value;

let totalText = document.getElementById("totalText").innerText;

if(nama=="" || email==""){
alert("Lengkapi data terlebih dahulu");
return;
}

document.getElementById("loading").style.display="block";

emailjs.send(
"service_3ckaa5o",
"template_xw4clmu",
{
to_email: email,
user_name: nama,
ticket_type: ticket,
quantity: qty,
total: totalText
}
)

.then(function(response){

window.location.href="success.html";

},

function(error){

window.location.href="failed.html";

});

}

hitungTotal();

</script>

</body>
</html>
