<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WESTLIFE THE ANNIVERSARY WORLD TOUR</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:url('background.png') center/cover no-repeat;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
color:white;
overflow:auto;
}

.container{
width:100%;
max-width:420px;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(15px);
border:1px solid rgba(255,215,0,0.3);
border-radius:25px;
padding:25px;
box-shadow:0 0 40px rgba(255,215,0,0.2);
animation:fade 1s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.poster{
width:100%;
border-radius:20px;
margin-bottom:20px;
}

h1{
font-size:24px;
text-align:center;
margin-bottom:10px;
color:gold;
}

.subtitle{
text-align:center;
margin-bottom:20px;
font-size:14px;
}

.countdown{
text-align:center;
font-size:18px;
margin-bottom:20px;
color:#ffd700;
}

input,select{
width:100%;
padding:14px;
margin-bottom:15px;
border:none;
border-radius:12px;
background:#111;
color:white;
font-size:15px;
}

.qris{
width:100%;
border-radius:20px;
margin-top:15px;
margin-bottom:20px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:gold;
color:black;
font-weight:bold;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
}

.admin{
margin-top:20px;
text-align:center;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<img src="posterevent.jpg" class="poster">

<h1>WESTLIFE THE ANNIVERSARY WORLD TOUR</h1>

<div class="subtitle">
🔖 OPEN PRE-SALE TICKET NOW<br>
🎫 TIKET DIGITAL
</div>

<div class="countdown" id="countdown"></div>

<input type="text" id="nama" placeholder="Nama Lengkap">

<input type="email" id="email" placeholder="Email Aktif">

<select id="kategori" onchange="hitungTotal()">

<option value="">Pilih Kategori</option>

<option value="2750000">VIP PACKAGE - Rp. 2.750.000</option>

<option value="2500000">CAT 1A & B - Rp. 2.500.000</option>

<option value="2250000">CAT 2A & B - Rp. 2.250.000</option>

<option value="1850000">CAT 3A & B - Rp. 1.850.000</option>

<option value="1450000">CAT 4A & B - Rp. 1.450.000</option>

<option value="1250000">CAT 5A & B - Rp. 1.250.000</option>

<option value="850000">CAT 6A & B - Rp. 850.000</option>

</select>

<input type="number" id="jumlah" placeholder="Jumlah Tiket" oninput="hitungTotal()">

<input type="text" id="total" placeholder="Total Pembayaran" readonly>

<img src="qris.png" class="qris">

<button onclick="kirimEmail()">
KONFIRMASI PEMBAYARAN
</button>

<div class="admin">
WHATSAPP ADMIN<br>
082372511525
</div>

</div>

<script>

emailjs.init("xetUr3ZyFtJ2V9-xE");

function hitungTotal(){

let harga=document.getElementById("kategori").value;
let jumlah=document.getElementById("jumlah").value;

let total=harga*jumlah;

document.getElementById("total").value=
"Rp. "+total.toLocaleString("id-ID");

}

function kirimEmail(){

const params={

user_name:document.getElementById("nama").value,

user_email:document.getElementById("email").value,

ticket_type:document.getElementById("kategori").options[
document.getElementById("kategori").selectedIndex
].text,

quantity:document.getElementById("jumlah").value,

total:document.getElementById("total").value

};

emailjs.send(
"service_3ckaa5o",
"template_xw4clmu",
params
)

.then(function(response){

window.location.href="success.html";

},

function(error){

window.location.href="failed.html";

});

}

let countDate=new Date("Dec 31, 2026 19:00:00").getTime();

setInterval(function(){

let now=new Date().getTime();

let distance=countDate-now;

let days=Math.floor(distance/(1000*60*60*24));

let hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));

let minutes=Math.floor((distance%(1000*60*60))/(1000*60));

let seconds=Math.floor((distance%(1000*60))/1000);

document.getElementById("countdown").innerHTML=
days+"H "+
hours+"J "+
minutes+"M "+
seconds+"D";

},1000);

</script>

</body>
</html>
