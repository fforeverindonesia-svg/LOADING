<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WESTLIFE ANNIVERSARY WORLD TOUR</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow:hidden;
}

.bg{
position:fixed;
width:100%;
height:100%;
background:url('https://fforeverindonesia-svg.github.io/background.png/') center/cover;
filter:blur(10px);
transform:scale(1.1);
z-index:-2;
animation:bgzoom 10s infinite alternate;
}

@keyframes bgzoom{
from{
transform:scale(1.1);
}
to{
transform:scale(1.2);
}
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
z-index:-1;
}

.container{
width:100%;
max-width:430px;
background:rgba(15,15,15,0.95);
border:1px solid rgba(255,0,0,0.5);
border-radius:25px;
padding:25px;
box-shadow:0 0 40px rgba(255,0,0,0.3);
animation:fadeIn 1s ease;
backdrop-filter:blur(10px);
}

.poster{
width:100%;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 0 20px rgba(255,0,0,0.4);
}

h1{
text-align:center;
font-size:28px;
color:#ff0000;
margin-bottom:10px;
}

.sub{
text-align:center;
font-size:14px;
margin-bottom:25px;
color:#ddd;
line-height:1.5;
}

.input{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:12px;
background:#1a1a1a;
color:#fff;
font-size:15px;
outline:none;
border:1px solid rgba(255,255,255,0.1);
}

.input:focus{
border:1px solid red;
box-shadow:0 0 10px rgba(255,0,0,0.4);
}

select.input{
appearance:none;
}

.qris{
width:100%;
border-radius:20px;
margin-top:15px;
margin-bottom:20px;
border:2px solid red;
box-shadow:0 0 25px rgba(255,0,0,0.4);
}

.total{
text-align:center;
font-size:22px;
margin-bottom:20px;
color:#FFD700;
font-weight:bold;
}

.btn{
width:100%;
padding:16px;
border:none;
border-radius:15px;
background:red;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 20px rgba(255,0,0,0.4);
}

.btn:hover{
transform:scale(1.03);
background:#ff2222;
}

.loading{
display:none;
text-align:center;
margin-top:15px;
font-size:14px;
color:#ccc;
}

.note{
margin-top:20px;
font-size:12px;
text-align:center;
color:#999;
line-height:1.5;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container">

<img src="posterevent.jpg">
<h1>WESTLIFE TOUR</h1>

<p class="sub">
🎫 PEMBAYARAN ULANG<br>
Secure Digital Ticket Confirmation
</p>

<input type="text" id="nama" class="input" placeholder="Nama Lengkap">

<input type="email" id="email" class="input" placeholder="Email Aktif">

<select id="ticket" class="input" onchange="hitungTotal()">

<option value="VIP PACKAGE">
VIP PACKAGE - Rp 2.750.000
</option>

<option value="CAT 1">
CAT 1 A & B - Rp 2.500.000
</option>

<option value="CAT 2">
CAT 2 A & B - Rp 2.250.000
</option>

<option value="CAT 3">
CAT 3 A & B - Rp 1.850.000
</option>

<option value="CAT 4">
CAT 4 A & B - Rp 1.450.000
</option>

<option value="CAT 5">
CAT 5 A & B - Rp 1.250.000
</option>

<option value="CAT 6">
CAT 6 A & B - Rp 850.000
</option>

</select>

<select id="qty" class="input" onchange="hitungTotal()">
<option value="1">1 Ticket</option>
<option value="2">2 Ticket</option>
<option value="3">3 Ticket</option>
<option value="4">4 Ticket</option>
</select>

<img src="qris.png">

<div class="total" id="totalText">
TOTAL : Rp 2.750.000
</div>

<button class="btn" onclick="kirimTicket()">
BAYAR SEKARANG
</button>

<div class="loading" id="loading">
Memproses pembayaran...
</div>

<div class="note">
E-ticket akan dikirim otomatis ke email setelah pembayaran berhasil.
</div>

</div>

<script>

emailjs.init("xetUr3ZyFtJ2V9-xE");

function hitungTotal(){

const ticket = document.getElementById("ticket").value;
const qty = parseInt(document.getElementById("qty").value);

let harga = 0;

if(ticket=="VIP PACKAGE"){
harga = 2750000;
}

if(ticket=="CAT 1"){
harga = 2500000;
}

if(ticket=="CAT 2"){
harga = 2250000;
}

if(ticket=="CAT 3"){
harga = 1850000;
}

if(ticket=="CAT 4"){
harga = 1450000;
}

if(ticket=="CAT 5"){
harga = 1250000;
}

if(ticket=="CAT 6"){
harga = 850000;
}

let total = harga * qty;

document.getElementById("totalText").innerHTML =
"TOTAL : Rp " + total.toLocaleString("id-ID");

}

function kirimTicket(){

const nama = document.getElementById("nama").value;
const email = document.getElementById("email").value;
const ticket = document.getElementById("ticket").value;
const qty = document.getElementById("qty").value;

let totalText = document.getElementById("totalText").innerText;

if(nama=="" || email==""){
alert("Lengkapi data terlebih dahulu");
return;
}

document.getElementById("loading").style.display="block";

emailjs.send(
"service_3ckaa5o",
"template_xw4clmu",
{
to_email: email,
user_name: nama,
ticket_type: ticket,
quantity: qty,
total: totalText
}
)

.then(function(response){

window.location.href="success.html";

},

function(error){

window.location.href="failed.html";

});

}

hitungTotal();

</script>

</body>
</html>
